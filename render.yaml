services:
  - type: web
    name: parksmart-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false          # you will paste the Aiven value in Render dashboard
      - key: SECRET_KEY
        generateValue: true  # Render auto-generates a secure random value
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: ALLOWED_ORIGINS
        sync: false          # paste your Vercel URL here after deploying frontend
